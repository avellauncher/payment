<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Оплата 99 ₽ — ЮMoney</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @font-face {
            font-family: "Yandex Sans Text";
            src: url("https://yastatic.net/s3/home/fonts/ys/ys-400-regular.woff2") format("woff2");
            font-weight: 400;
            font-style: normal;
        }
        @font-face {
            font-family: "Yandex Sans Text";
            src: url("https://yastatic.net/s3/home/fonts/ys/ys-500-medium.woff2") format("woff2");
            font-weight: 500;
            font-style: normal;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Yandex Sans Text", system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #f0f2f5 0%, #e9ebf0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .payment-card {
            max-width: 680px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 40px -10px rgba(0, 20, 40, 0.2), 0 8px 20px rgba(0, 0, 0, 0.06);
            padding: 32px 32px 36px;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .yoo-logo { height: 32px; width: auto; display: block; }
        .secure-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #EEF2F6;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            color: #1A2B3E;
        }
        .amount-summary { text-align: left; margin-bottom: 28px; }
        .amount-summary h2 {
            font-size: 20px;
            font-weight: 500;
            color: #5a6b7c;
            margin-bottom: 6px;
        }
        .price-large { display: flex; align-items: baseline; gap: 8px; }
        .price-large .value { font-size: 48px; font-weight: 500; color: #0b1f33; line-height: 1.1; }
        .price-large .currency { font-size: 24px; font-weight: 400; color: #7f8c9a; margin-left: 4px; }
        .price-caption {
            color: #3e5469;
            font-size: 15px;
            margin-top: 8px;
            border-left: 3px solid #3182ce;
            padding-left: 14px;
            background: #f8fafd;
            border-radius: 0 8px 8px 0;
            width: fit-content;
            padding: 8px 18px 8px 14px;
        }
        .payment-section-label {
            font-size: 15px;
            font-weight: 500;
            color: #5a6b7c;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .payment-section-label::before {
            content: "";
            width: 4px;
            height: 18px;
            background: linear-gradient(180deg, #5b7cff, #8b5cf6);
            border-radius: 2px;
        }
        .frame-wrapper {
            margin: 0;
            background: #ffffff;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0, 20, 40, 0.06);
            border: 1px solid #e8ecf2;
            position: relative;
        }
        .frame-wrapper iframe {
            display: block;
            width: 100%;
            max-width: 500px;
            height: 480px;
            margin: 0 auto;
            border: none;
            border-radius: 16px;
            background: white;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
        }
        /* Белый блок закрывает верх виджета — видна только кнопка «Перевести» */
        .frame-wrapper .cover-top {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 500px;
            height: 400px;
            background: linear-gradient(180deg, #ffffff 0%, #fafcff 100%);
            border-radius: 16px 16px 0 0;
            z-index: 2;
            pointer-events: none;
        }
        /* Кнопка «Оплатить» поверх белого квадрата — клик проходит к виджету */
        .frame-wrapper .pay-btn-overlay {
            position: absolute;
            top: calc(50% + 48px + 40px);
            left: 50%;
            transform: translate(-50%, -50%);
            width: calc(100% - 48px);
            max-width: 420px;
            padding: 16px 24px;
            background: #5b7cff;
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            text-align: center;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            z-index: 3;
            pointer-events: none;
            box-shadow: 0 4px 16px rgba(91, 124, 255, 0.35);
        }
        .footer-trust {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            margin-top: 24px;
            padding-top: 18px;
            border-top: 1px solid #e6eaef;
            font-size: 14px;
            color: #506e8c;
            gap: 12px;
        }
        .pay-methods { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
        .pay-methods img { height: 28px; width: auto; object-fit: contain; }
        .support-link {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #2b6bb1;
            font-weight: 500;
            text-decoration: none;
            background: #ecf3fa;
            padding: 5px 12px;
            border-radius: 30px;
        }
        .support-link:hover { background: #e0ebf7; }
        .support-link svg { width: 18px; height: 18px; stroke: #2b6bb1; stroke-width: 1.8; fill: none; }
        .legal-note {
            font-size: 12px;
            color: #8a9bb0;
            margin-top: 20px;
            text-align: center;
            line-height: 1.5;
            padding: 12px 16px;
            background: #f8fafd;
            border-radius: 12px;
            border: 1px solid #eef2f8;
        }
        @media (max-width: 480px) {
            .payment-card { padding: 20px 16px; border-radius: 28px; }
            .price-large .value { font-size: 40px; }
            .amount-summary h2 { font-size: 18px; }
            .frame-wrapper { padding: 16px; }
            .frame-wrapper .cover-top { top: 16px; height: 360px; }
            .frame-wrapper iframe { height: 440px; }
            .footer-trust { flex-direction: column; align-items: flex-start; }
            .pay-methods img { height: 24px; }
        }
    </style>
</head>
<body>
    <div class="payment-card">
        <div class="top-bar">
            <img class="yoo-logo" src="https://yoomoney.ru/i/shop/iomoney_logo_color_example.png" alt="ЮMoney">
            <div class="secure-badge">🔒 Защищено ЮMoney</div>
        </div>
        <div class="amount-summary">
            <h2>К оплате</h2>
            <div class="price-large">
                <span class="value">99</span>
                <span class="currency">₽</span>
            </div>
        </div>
        <div class="payment-section-label">Перейти к оплате</div>
        <div class="frame-wrapper">
            <iframe src="https://yoomoney.ru/quickpay/fundraise/widget?billNumber=1G7DOHR7EQQ.260228&" width="500" height="480" frameborder="0" allowtransparency="true" scrolling="no" title="Форма оплаты ЮMoney"></iframe>
            <div class="cover-top" aria-hidden="true"></div>
            <div class="pay-btn-overlay" aria-hidden="true">Оплатить</div>
        </div>
        <div class="footer-trust">
            <div class="pay-methods">
                <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Mir-logo.svg" alt="МИР" title="МИР">
                <img src="https://cdn.jsdelivr.net/npm/credit-card-logos@1.0.5/img/card-logo-mastercard.svg" alt="Mastercard" title="Mastercard">
                <img src="https://cdn.jsdelivr.net/npm/credit-card-logos@1.0.5/img/card-logo-visa.svg" alt="Visa" title="Visa">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/58/Maestro_2016.svg" alt="Maestro" title="Maestro">
            </div>
            <a href="#" class="support-link" title="Помощь">
                <svg viewBox="0 0 22 22"><circle cx="11" cy="11" r="8" stroke="currentColor" fill="none"/><path d="M11 7v4M11 15h.01" stroke="currentColor" stroke-linecap="round"/></svg>
                Помощь
            </a>
        </div>
        <div class="legal-note">
            Безопасная оплата через ЮMoney. После нажатия «Оплатить» вы будете перенаправлены на страницу оплаты.<br>
            <span style="opacity: 0.7; font-size: 11px; margin-top: 4px; display: block;">ООО «Юмани» · Защищённый платёжный шлюз</span>
        </div>
    </div>
</body>
</html>
